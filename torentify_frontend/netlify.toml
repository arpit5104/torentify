[build]
  command = "npm run build"
  publish = "dist"

[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 4000

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/jobs"
  to = "/.netlify/functions/jobs"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-store, no-cache, must-revalidate, proxy-revalidate"