<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torentify - Where Talent Meets Opportunity</title>
  <meta name="description"
    content="Torentify is a smart, modern job portal connecting ambitious professionals with forward-thinking companies. Find jobs, hire talent, and grow faster with Torentify.">
  <meta name="google-site-verification" content="F_6fSpJe5wSO7DyqkIsLraKeurmI_uvxjLqi4tIWcLI" />

  <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">

  <!-- <script src="https://cdn.tailwindcss.com"></script> -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="canonical" href="https://torentify.com/" />

   <!-- Prevent FOUC -->
  <style>
    html { visibility: hidden; }
  </style>

  <script>
    window.tailwind = window.tailwind || {};
  </script>

  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
      // Show page after Tailwind loads
    document.addEventListener("DOMContentLoaded", () => {
      document.documentElement.style.visibility = "visible";
    });
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    @keyframes scroll-left {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-scroll-left {
      animation: scroll-left 30s linear infinite;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0"
  }
}
</script>
  <!-- <link rel="stylesheet" href="/index.css"> -->
</head>

<body
  class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 overflow-x-hidden transition-colors duration-300">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
